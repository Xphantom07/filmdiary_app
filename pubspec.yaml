name: film_diary
description: "FilmDiary — A personal cinema journal to log, rate, and review movies."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Material icons
  cupertino_icons: ^1.0.8

  # google_fonts — Provides Poppins typeface for modern, clean typography
  google_fonts: ^6.2.1

  # hive — Lightweight, fast NoSQL local database for storing movie entries
  hive: ^2.2.3

  # hive_flutter — Flutter integration for Hive (initializes Hive with path_provider)
  hive_flutter: ^1.1.0

  # path_provider — Locates the device documents directory (required by Hive)
  path_provider: ^2.1.4

  # flutter_rating_bar — Interactive and display-only star rating widgets
  flutter_rating_bar: ^4.0.1

  # uuid — Generates RFC 4122 unique IDs for each movie entry
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # hive_generator — Code generation for Hive TypeAdapters (run in Phase 2)
  hive_generator: ^2.0.1

  # build_runner — Required to trigger hive_generator code generation
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
